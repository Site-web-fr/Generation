name: Deploy GitHub Pages

on:
  push:
    branches: [main, cursor/premium-landings-8794]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            halles-lez-landings/package-lock.json
            premium-landings/package-lock.json

      - name: Install Halles du Lez dependencies
        working-directory: halles-lez-landings
        run: npm ci

      - name: Build Halles du Lez for GitHub Pages
        working-directory: halles-lez-landings
        env:
          GITHUB_PAGES: 'true'
        run: npm run build:pages

      - name: Install Premium Landings dependencies
        working-directory: premium-landings
        run: npm ci

      - name: Build Premium Landings for GitHub Pages
        working-directory: premium-landings
        env:
          GITHUB_PAGES: 'true'
        run: npm run build:pages

      - name: Combine artifacts
        run: |
          mkdir -p combined
          cp -r halles-lez-landings/dist/* combined/
          mkdir -p combined/premium
          cp -r premium-landings/dist/* combined/premium/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
