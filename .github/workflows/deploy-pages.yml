name: Deploy GitHub Pages

on:
  push:
    branches: [main, cursor/premium-landings-8794]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            halles-lez-landings/package-lock.json
            premium-landings/package-lock.json

      - name: Install Halles du Lez dependencies
        working-directory: halles-lez-landings
        run: npm ci

      - name: Build Halles du Lez for GitHub Pages
        working-directory: halles-lez-landings
        env:
          GITHUB_PAGES: 'true'
        run: npm run build:pages

      - name: Install Premium Landings dependencies
        working-directory: premium-landings
        run: npm ci

      - name: Build Premium Landings for GitHub Pages
        working-directory: premium-landings
        env:
          GITHUB_PAGES: 'true'
        run: npm run build:pages

      - name: Combine artifacts
        run: |
          mkdir -p combined
          cp -r halles-lez-landings/dist/* combined/
          mkdir -p combined/premium
          cp -r premium-landings/dist/* combined/premium/
          cp pilot.html combined/pilot.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./combined
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'deploy: GitHub Pages — halles + premium + pilot mobile'
