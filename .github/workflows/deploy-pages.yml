name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            halles-lez-landings/package-lock.json
            premium-landings/package-lock.json

      - name: Install premium dependencies (TypeScript resolution)
        working-directory: premium-landings
        run: npm ci

      - name: Install dependencies
        working-directory: halles-lez-landings
        run: npm ci

      - name: Build unified app (Halles + Premium)
        working-directory: halles-lez-landings
        env:
          GITHUB_PAGES: 'true'
        run: npm run build:pages

      - name: Prepare deploy bundle
        run: |
          mkdir -p combined
          cp -r halles-lez-landings/dist/* combined/
          cp pilot.html combined/pilot.html
          mkdir -p combined/premium
          printf '%s\n' \
            '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">' \
            '<meta http-equiv="refresh" content="0;url=/Generation/#/premium">' \
            '<script>location.replace("/Generation/#/premium")</script>' \
            '<title>Redirection Premium</title></head><body></body></html>' \
            > combined/premium/index.html
          touch combined/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
