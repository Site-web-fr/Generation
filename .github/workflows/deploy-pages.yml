name: Deploy GitHub Pages

on:
  push:
    branches: [main, cursor/premium-landings-8794]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            halles-lez-landings/package-lock.json
            premium-landings/package-lock.json

      - name: Install premium dependencies (TypeScript resolution)
        working-directory: premium-landings
        run: npm ci

      - name: Install dependencies
        working-directory: halles-lez-landings
        run: npm ci

      - name: Build unified app (Halles + Premium)
        working-directory: halles-lez-landings
        env:
          GITHUB_PAGES: 'true'
        run: npm run build:pages

      - name: Prepare deploy bundle
        run: |
          mkdir -p combined
          cp -r halles-lez-landings/dist/* combined/
          cp pilot.html combined/pilot.html
          mkdir -p combined/premium
          printf '%s\n' \
            '<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">' \
            '<meta http-equiv="refresh" content="0;url=/Generation/#/premium">' \
            '<script>location.replace("/Generation/#/premium")</script>' \
            '<title>Redirection Premium</title></head><body></body></html>' \
            > combined/premium/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./combined
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'deploy: unified Generation app — halles + premium + pilot'
